# See https://wiki.hyprland.org/Configuring/Variables/ for more
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
		rounding = 20
		rounding_power = 2

		shadow {
				enabled = true
				range = 4
				render_power = 3
				color = rgba(1a1a1aee)
		}
		
		blur {
				enabled = true
				size = 3
				passes = 2
				vibrancy = 0.1696
		}
}
